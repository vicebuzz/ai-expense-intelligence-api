name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"
      - run: dotnet restore ExpenseIntelligence.sln
      - run: dotnet build ExpenseIntelligence.sln --no-restore -c Release
      - run: dotnet test ExpenseIntelligence.sln --no-build -c Release --if-present
