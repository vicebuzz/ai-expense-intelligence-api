services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_intelligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  categorization:
    build: ./services/categorization
    ports:
      - "8000:8000"

  api:
    build:
      context: .
      dockerfile: src/ExpenseIntelligence.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=expense_intelligence;Username=postgres;Password=postgres
      Database__UseLegacySchema: "false"
      CategorizationService__BaseUrl: http://categorization:8000
      Cors__Origins__0: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      categorization:
        condition: service_started

volumes:
  pgdata:
